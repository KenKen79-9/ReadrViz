version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: readrviz_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: readrviz
      POSTGRES_PASSWORD: readrviz
      POSTGRES_DB: readrviz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readrviz"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
